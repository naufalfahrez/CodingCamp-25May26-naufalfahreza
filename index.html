<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense & Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon">💰</span>
        <h1 class="brand-title">Budget Visualizer</h1>
      </div>
      <button id="themeToggle" class="btn-icon" aria-label="Toggle dark/light mode" title="Toggle Theme">
        <span id="themeIcon">🌙</span>
      </button>
    </div>
  </header>

  <main class="container">

    <!-- ===== BALANCE CARD ===== -->
    <section class="card balance-card" aria-label="Total Balance">
      <p class="balance-label">Total Pengeluaran</p>
      <h2 class="balance-amount" id="totalBalance">Rp 0</h2>
      <p class="balance-sub" id="txCount">0 transaksi tercatat</p>
    </section>

    <!-- ===== SPENDING ALERT LIMIT ===== -->
    <section class="card alert-card">
      <h3 class="card-title">⚠️ Batas Peringatan</h3>
      <div class="alert-row">
        <input
          type="number"
          id="alertLimit"
          class="input"
          placeholder="Contoh: 500000"
          min="0"
          aria-label="Batas pengeluaran maksimum per transaksi"
        />
        <button id="setLimitBtn" class="btn btn-secondary">Set Limit</button>
      </div>
      <p class="alert-hint" id="limitHint">Belum ada limit yang ditetapkan.</p>
    </section>

    <!-- ===== ADD TRANSACTION FORM ===== -->
    <section class="card form-card">
      <h3 class="card-title">➕ Tambah Transaksi</h3>
      <form id="txForm" novalidate>
        <div class="form-group">
          <label for="txName" class="label">Nama Transaksi</label>
          <input
            type="text"
            id="txName"
            class="input"
            placeholder="Contoh: Makan siang"
            autocomplete="off"
            required
          />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="txAmount" class="label">Nominal (Rp)</label>
            <input
              type="number"
              id="txAmount"
              class="input"
              placeholder="0"
              min="1"
              step="any"
              required
            />
          </div>
          <div class="form-group">
            <label for="txCategory" class="label">Kategori</label>
            <select id="txCategory" class="input select" required>
              <option value="">-- Pilih --</option>
              <option value="Food">🍔 Food</option>
              <option value="Transport">🚗 Transport</option>
              <option value="Fun">🎮 Fun</option>
              <option value="Other">📦 Other</option>
            </select>
          </div>
        </div>
        <p class="form-error" id="formError" role="alert" aria-live="polite"></p>
        <button type="submit" class="btn btn-primary btn-full">Tambah Transaksi</button>
      </form>
    </section>

    <!-- ===== TRANSACTION LIST + CHART ===== -->
    <div class="content-grid">

      <!-- Transaction List -->
      <section class="card list-card">
        <div class="list-header">
          <h3 class="card-title">📋 Riwayat Transaksi</h3>
          <select id="sortSelect" class="input select sort-select" aria-label="Urutkan transaksi">
            <option value="newest">Terbaru</option>
            <option value="highest">Nominal Tertinggi</option>
            <option value="lowest">Nominal Terendah</option>
          </select>
        </div>
        <ul class="tx-list" id="txList" aria-label="Daftar transaksi"></ul>
      </section>

      <!-- Chart -->
      <section class="card chart-card">
        <h3 class="card-title">📊 Pengeluaran per Kategori</h3>
        <div class="chart-wrapper">
          <canvas id="expenseChart" aria-label="Pie chart pengeluaran per kategori"></canvas>
        </div>
        <p class="chart-empty" id="chartEmpty">Tambahkan transaksi untuk melihat grafik.</p>

        <!-- Ringkasan total per kategori -->
        <div class="summary-section" id="categorySummary" aria-label="Ringkasan per kategori"></div>
      </section>

    </div>
  </main>

  <footer class="app-footer">
    <p>Expense &amp; Budget Visualizer &copy; 2025</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
